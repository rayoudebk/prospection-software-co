name: Discovery Model Routing Matrix

on:
  pull_request:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        route_profile: [gemini_only, orchestrated_multi_provider]
        external_tools: [off, on]
        chrome_mcp: [off, on]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      CHROME_MCP_ENABLED: ${{ matrix.chrome_mcp == 'on' && 'true' || 'false' }}
      LLM_STAGE_DISCOVERY_MODELS: ${{ matrix.route_profile == 'gemini_only' && 'gemini:gemini-2.0-flash' || 'gemini:gemini-2.0-flash,anthropic:claude-3-7-sonnet-latest,openai:gpt-4.1-mini' }}
      LLM_STAGE_ADJUDICATION_MODELS: ${{ matrix.route_profile == 'gemini_only' && 'gemini:gemini-2.0-flash' || 'anthropic:claude-3-7-sonnet-latest,openai:gpt-4.1,gemini:gemini-2.0-flash' }}
      LLM_STAGE_STRUCTURED_MODELS: ${{ matrix.route_profile == 'gemini_only' && 'gemini:gemini-2.0-flash' || 'openai:gpt-4.1-mini,anthropic:claude-3-5-haiku-latest,gemini:gemini-2.0-flash' }}
      EXTERNAL_SEARCH_CANDIDATES_CAP: ${{ matrix.external_tools == 'on' && '25' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Backend Unit Tests
        run: pytest -q backend/tests

      - name: Build Baseline Metrics
        run: |
          python backend/scripts/discovery_replay_benchmark.py \
            --corpus backend/benchmarks/corpus/sample_replay.json \
            --out backend/benchmarks/matrix_baseline.json

      - name: Build Candidate Metrics
        run: |
          python backend/scripts/discovery_replay_benchmark.py \
            --corpus backend/benchmarks/corpus/sample_replay.json \
            --out backend/benchmarks/matrix_candidate.json

      - name: Compare and Gate
        run: |
          python backend/scripts/discovery_compare_reports.py \
            --baseline backend/benchmarks/matrix_baseline.json \
            --candidate backend/benchmarks/matrix_candidate.json \
            --thresholds backend/benchmarks/thresholds.json \
            --out backend/benchmarks/matrix_compare_report.json

      - name: Quality Audit Gate
        run: |
          python backend/scripts/discovery_quality_audit.py \
            --corpus backend/benchmarks/corpus/sample_replay.json \
            --thresholds backend/benchmarks/thresholds.json \
            --out backend/benchmarks/matrix_quality_audit_report.json \
            --fail-on-violation

      - name: Upload Matrix Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-routing-${{ matrix.route_profile }}-ext-${{ matrix.external_tools }}-chrome-${{ matrix.chrome_mcp }}
          path: |
            backend/benchmarks/matrix_baseline.json
            backend/benchmarks/matrix_candidate.json
            backend/benchmarks/matrix_compare_report.json
            backend/benchmarks/matrix_quality_audit_report.json
